<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #8a8a93;
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .sound-card {
            background: #1e1e24;
            border: 2px solid #2a2a32;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
        }

        .sound-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.1);
        }

        .sound-card:active {
            transform: translateY(1px);
        }

        .sound-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e1e1e6;
        }

        .play-icon {
            font-size: 1.5rem;
            color: #00ff88;
        }
    </style>

</head>

<body>

    <header>
        <h1>Sound Dashboard</h1>
        <p>Clicca su una tessera per riprodurre l'effetto sonoro</p>
    </header>

    <main class="dashboard-grid">

        <div class="sound-card" onclick="playSound('esplosione')">
            <div class="sound-title">Esplosione</div>
            <div class="play-icon">▶</div>
        </div>

        <div class="sound-card" onclick="playSound('tubo_di_metallo')">
            <div class="sound-title">Tubo di metallo</div>
            <div class="play-icon">▶</div>
        </div>

        <div class="sound-card" onclick="playSound('fbi_open_up')">
            <div class="sound-title">FBI OPEN UP</div>
            <div class="play-icon">▶</div>
        </div>

        <div class="sound-card" onclick="playSound('errore_windows_xp')">
            <div class="sound-title">Errore Windows XP</div>
            <div class="play-icon">▶</div>
        </div>

    </main>

    <script>
        const audioPlayer = new Audio();

        function playSound(soundName) {
            audioPlayer.src = `sounds/${soundName}.mp3`;
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        }
    </script>

</body>

</html>
